<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Notes App</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="menu">
        <span class="title">Notes</span>
        <div class="btn-refresh-home">
            <button class="refresh-btn btn">Refresh</button>
            <a href="#" class="home-btn btn">Home</a>
        </div>
    </div>
    <div class="container">
        <div class="input-note">
            <input type="text" class="input-text" placeholder="Enter New Note">
            <button class="input-submit-btn input-btn">Submit</button>
            <button class="input-list-btn input-btn">List</button>
        </div>
        <div class="show-note">
            <!-- When add note show here! -->
        </div>
    </div>
</body>
</html>
